<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rent A Hobby — Messages</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;700;900&family=Caveat:wght@600&family=Barlow+Condensed:wght@700;900&display=swap" rel="stylesheet">

<style>
:root {
  --red: #D92B1A;
  --orange: #C85A1A;
  --mustard: #D4A017;
  --cobalt: #1A3A8F;
  --teal: #0E7C7B;
  --cream: #F5EDD8;
  --offwhite: #FAF6EE;
  --ink: #1A1208;
  --paper: #EDE3C8;
  --neon-yellow: #F0E040;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--cream);
  font-family: 'Nunito', sans-serif;
  color: var(--ink);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ── HEADER ── */
.site-header {
  background: var(--ink);
  color: var(--cream);
  text-align: center;
  padding: 1rem 2rem;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1rem;
  letter-spacing: 0.15em;
  flex-shrink: 0;
}

/* ── APP LAYOUT ── */
.app {
  flex: 1;
  display: grid;
  grid-template-columns: 300px 1fr;
  max-width: 980px;
  width: 100%;
  margin: 2.5rem auto;
  height: calc(100vh - 130px);
}

@media (max-width: 640px) {
  .app { grid-template-columns: 1fr; margin: 1rem; height: auto; }
  .chat-panel { display: none; }
  .chat-panel.visible { display: flex; }
  .contacts-panel.hidden { display: none; }
}

/* ── CONTACTS PANEL ── */
.contacts-panel {
  background: var(--offwhite);
  border: 2.5px solid var(--ink);
  box-shadow: 6px 6px 0 var(--ink);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.contacts-heading {
  background: var(--ink);
  color: var(--cream);
  padding: 0.9rem 1.2rem;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.1rem;
  letter-spacing: 0.12em;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 0.5rem;
}

.contacts-heading small {
  font-family: 'Caveat', cursive;
  font-size: 0.85rem;
  opacity: 0.5;
  letter-spacing: 0;
}

.contact-list {
  flex: 1;
  overflow-y: auto;
}

.contact {
  padding: 0.85rem 1.1rem;
  border-bottom: 1.5px solid rgba(26,18,8,0.1);
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 0.85rem;
  transition: background 0.12s;
}

.contact:hover { background: var(--paper); }
.contact.active { background: var(--ink); color: var(--cream); }
.contact.active .contact-preview { color: rgba(245,237,216,0.5); }

.avatar {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1rem;
  letter-spacing: 0.05em;
  color: white;
  flex-shrink: 0;
  border: 2px solid var(--ink);
}

.contact-info { flex: 1; min-width: 0; }

.contact-name {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.98rem;
  font-weight: 900;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}

.contact-preview {
  font-family: 'Caveat', cursive;
  font-size: 0.88rem;
  opacity: 0.5;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-top: 1px;
}

.unread {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--red);
  flex-shrink: 0;
}

/* ── CHAT PANEL ── */
.chat-panel {
  background: var(--offwhite);
  border: 2.5px solid var(--ink);
  border-left: none;
  box-shadow: 6px 6px 0 var(--mustard);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* empty state */
.chat-empty {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  opacity: 0.3;
  gap: 0.6rem;
}

.chat-empty-icon { font-size: 2.8rem; }

.chat-empty p {
  font-family: 'Caveat', cursive;
  font-size: 1.1rem;
}

/* chat header */
.chat-header {
  background: var(--cobalt);
  padding: 0.85rem 1.2rem;
  color: white;
  display: none;
  align-items: center;
  gap: 0.75rem;
  flex-shrink: 0;
}

.chat-header.visible { display: flex; }

.chat-header-avatar {
  width: 34px;
  height: 34px;
  border-radius: 50%;
  background: rgba(255,255,255,0.2);
  border: 1.5px solid rgba(255,255,255,0.3);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 0.9rem;
  flex-shrink: 0;
}

.chat-header-info { flex: 1; }

.chat-header-name {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 1rem;
  font-weight: 900;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.chat-header-sub {
  font-family: 'Caveat', cursive;
  font-size: 0.85rem;
  opacity: 0.6;
}

.back-btn {
  display: none;
  background: rgba(255,255,255,0.15);
  border: 1px solid rgba(255,255,255,0.3);
  color: white;
  padding: 4px 10px;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.75rem;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  cursor: pointer;
}

@media (max-width: 640px) { .back-btn { display: block; } }

/* messages */
.chat-body {
  flex: 1;
  overflow-y: auto;
  padding: 1.1rem;
  display: flex;
  flex-direction: column;
  gap: 0.55rem;
  background: var(--cream);
}

.msg-wrap {
  display: flex;
  flex-direction: column;
}

.msg-wrap.sent  { align-items: flex-end; }
.msg-wrap.received { align-items: flex-start; }

.msg {
  max-width: 72%;
  padding: 0.55rem 0.9rem;
  font-size: 0.9rem;
  line-height: 1.5;
  word-break: break-word;
  border: 2px solid var(--ink);
  box-shadow: 2px 2px 0 var(--ink);
}

.msg-sent     { background: var(--red); color: white; }
.msg-received { background: var(--offwhite); color: var(--ink); }

.msg-time {
  font-family: 'Caveat', cursive;
  font-size: 0.78rem;
  opacity: 0.45;
  margin-top: 2px;
  padding: 0 2px;
}

.msg-sent + .msg-time    { color: var(--ink); }

/* date divider */
.date-divider {
  text-align: center;
  font-family: 'Caveat', cursive;
  font-size: 0.82rem;
  opacity: 0.38;
  display: flex;
  align-items: center;
  gap: 0.6rem;
  margin: 0.3rem 0;
}

.date-divider::before,
.date-divider::after {
  content: "";
  flex: 1;
  height: 1px;
  background: var(--ink);
  opacity: 0.2;
}

/* typing dots */
.typing {
  display: none;
  align-items: center;
  gap: 4px;
  padding: 0.55rem 0.9rem;
  background: var(--offwhite);
  border: 2px solid var(--ink);
  box-shadow: 2px 2px 0 var(--ink);
  align-self: flex-start;
  width: fit-content;
}

.typing.show { display: flex; }

.dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--ink);
  opacity: 0.4;
  animation: blink 1.2s infinite;
}

.dot:nth-child(2) { animation-delay: 0.2s; }
.dot:nth-child(3) { animation-delay: 0.4s; }

@keyframes blink {
  0%,60%,100% { transform: translateY(0); opacity: 0.4; }
  30%          { transform: translateY(-5px); opacity: 1; }
}

/* input */
.chat-input-row {
  display: flex;
  border-top: 2.5px solid var(--ink);
  flex-shrink: 0;
}

.chat-input-row input {
  flex: 1;
  padding: 0.85rem 1rem;
  border: none;
  background: var(--offwhite);
  font-family: 'Nunito', sans-serif;
  font-size: 0.92rem;
  color: var(--ink);
  outline: none;
}

.chat-input-row input::placeholder { opacity: 0.4; }

.send-btn {
  background: var(--red);
  color: white;
  border: none;
  border-left: 2.5px solid var(--ink);
  padding: 0.85rem 1.2rem;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1rem;
  letter-spacing: 0.1em;
  cursor: pointer;
  transition: background 0.1s;
}

.send-btn:hover { background: var(--orange); }

/* scrollbar */
.chat-body::-webkit-scrollbar,
.contact-list::-webkit-scrollbar { width: 3px; }
.chat-body::-webkit-scrollbar-thumb { background: rgba(26,18,8,0.25); }
</style>
</head>
<body>

<div class="site-header">RENT A HOBBY &nbsp;·&nbsp; BORROW. TRY. OWN.</div>

<div class="app">

  <!-- CONTACTS -->
  <div class="contacts-panel" id="contactsPanel">
    <div class="contacts-heading">
      MESSAGES <small>/ inbox</small>
    </div>
    <div class="contact-list" id="contactList"></div>
  </div>

  <!-- CHAT -->
  <div class="chat-panel" id="chatPanel">

    <div class="chat-header" id="chatHeader">
      <div class="chat-header-avatar" id="chatAvatar"></div>
      <div class="chat-header-info">
        <div class="chat-header-name" id="chatName">—</div>
        <div class="chat-header-sub" id="chatSub">online</div>
      </div>
      <button class="back-btn" onclick="goBack()">← Back</button>
    </div>

    <div class="chat-body" id="chatBody">
      <div class="chat-empty" id="chatEmpty">
        <div class="chat-empty-icon">✉</div>
        <p>Select a conversation</p>
      </div>
      <div class="typing" id="typingIndicator">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
      </div>
    </div>

    <div class="chat-input-row" id="inputRow" style="display:none">
      <input type="text" id="msgInput" placeholder="Type a message…" autocomplete="off">
      <button class="send-btn" onclick="sendMessage()">SEND ✦</button>
    </div>

  </div>
</div>

<script>
/* ── CONTACTS CONFIG ── */
const contacts = [
  {
    id: "amisha",
    name: "Amisha",
    role: "Seller",
    color: "#D92B1A",
    initials: "A",
    ai: true,
    history: [
      { text: "Hey!Product available ano?", from: "received" },
      { text: "Nalla conditon?", from: "received" }
    ]
  },
  {
    id: "Hiba",
    name: "Hiba",
    role: "Fellow renter",
    color: "#0E7C7B",
    initials: "N",
    ai: false,
    replies: ["Haha nice 😄", "Which one did you rent?", "Totally worth it!", "We should try together!", "Adipoli 🔥", "Cool cool 👍"],
    history: [
      { text: "Did you try the Pentax K1000? 📷", from: "received" }
    ]
  },
  {
    id: "Althea",
    name: "Althea",
    role: "Listing seller",
    color: "#C85A1A",
    initials: "H",
    ai: false,
    history: [
      { text: "Hey! I'm selling this — good condition 👍", from: "received" }
    ],
    scriptedReplies: {
      "hey": "Hey! I'm selling this 😄",
      "price": "₹500/day but negotiable 😉",
      "discount": "Okay ₹400 final! Deal?",
      "condition": "Really good condition, barely used!",
      "available": "Yes available from this weekend!",
      "ok":"Sett!",
      "phone number":"9034565435",
      "default": "Good condition 👍 Interested?"
    }
  }
];

let current = null;

/* ── BUILD CONTACT LIST ── */
function buildList() {
  const list = document.getElementById("contactList");
  contacts.forEach(c => {
    const last = c.history[c.history.length - 1];
    const el = document.createElement("div");
    el.className = "contact";
    el.id = "ct-" + c.id;
    el.onclick = () => openChat(c);
    el.innerHTML = `
      <div class="avatar" style="background:${c.color}">${c.initials}</div>
      <div class="contact-info">
        <div class="contact-name">${c.name}</div>
        <div class="contact-preview">${last ? last.text.slice(0,34) + (last.text.length>34?"…":"") : "Say hi!"}</div>
      </div>
      <div class="unread"></div>
    `;
    list.appendChild(el);
  });
}

/* ── OPEN CHAT ── */
function openChat(contact) {
  current = contact;

  // highlight
  document.querySelectorAll(".contact").forEach(el => el.classList.remove("active"));
  document.getElementById("ct-" + contact.id).classList.add("active");

  // hide unread dot
  const dot = document.querySelector("#ct-" + contact.id + " .unread");
  if (dot) dot.style.display = "none";

  // header
  document.getElementById("chatHeader").classList.add("visible");
  document.getElementById("chatName").textContent = contact.name;
  document.getElementById("chatSub").textContent  = contact.role;
  document.getElementById("chatAvatar").textContent = contact.initials;
  document.getElementById("chatAvatar").style.background = contact.color;

  // show input
  document.getElementById("inputRow").style.display = "flex";

  // clear body (keep typing indicator)
  const body = document.getElementById("chatBody");
  Array.from(body.children).forEach(ch => {
    if (ch.id !== "typingIndicator") ch.remove();
  });

  // date divider
  const div = document.createElement("div");
  div.className = "date-divider";
  div.textContent = "Today";
  body.insertBefore(div, document.getElementById("typingIndicator"));

  // render history
  contact.history.forEach(m => renderMsg(m.text, m.from));

  body.scrollTop = body.scrollHeight;

  // mobile
  if (window.innerWidth <= 640) {
    document.getElementById("contactsPanel").classList.add("hidden");
    document.getElementById("chatPanel").classList.add("visible");
  }

  document.getElementById("msgInput").focus();
}

/* ── RENDER A MESSAGE ── */
function renderMsg(text, type) {
  const body   = document.getElementById("chatBody");
  const typing = document.getElementById("typingIndicator");

  const wrap = document.createElement("div");
  wrap.className = "msg-wrap " + (type === "sent" ? "sent" : "received");

  const msg = document.createElement("div");
  msg.className = "msg msg-" + (type === "sent" ? "sent" : "received");
  msg.textContent = text;

  const time = document.createElement("div");
  time.className = "msg-time";
  const now = new Date();
  time.textContent = now.getHours().toString().padStart(2,"0") + ":" + now.getMinutes().toString().padStart(2,"0");

  wrap.appendChild(msg);
  wrap.appendChild(time);
  body.insertBefore(wrap, typing);
  body.scrollTop = body.scrollHeight;
}

/* ── SEND MESSAGE ── */
async function sendMessage() {
  const input = document.getElementById("msgInput");
  const text  = input.value.trim();
  if (!text || !current) return;

  renderMsg(text, "sent");
  input.value = "";

  // save to history
  current.history.push({ text, from: "sent" });
  updatePreview(current);

  // show typing
  const typing = document.getElementById("typingIndicator");
  typing.classList.add("show");
  document.getElementById("chatBody").scrollTop = 9999;

  if (current.ai) {
    // ── Claude API reply ──
    try {
      const history = current.history.slice(-12).map(m => ({
        role: m.from === "sent" ? "user" : "assistant",
        content: m.text
      }));

      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 100,
          system: "You are Amisha, a friendly assistant for 'Rent A Hobby' — a platform to rent hobby gear like cameras, guitars, skateboards, art kits, etc. Reply in 1-2 short sentences, casual and warm. Use emojis occasionally. Recommend specific items when relevant.",
          messages: history
        })
      });
      const data  = await res.json();
      const reply = data.content?.[0]?.text?.trim() || "Tell me more! 👀";
      typing.classList.remove("show");
      renderMsg(reply, "received");
      current.history.push({ text: reply, from: "received" });
      updatePreview(current);
    } catch(e) {
      typing.classList.remove("show");
      renderMsg("Oops, lost connection 😅 Try again!", "received");
    }

  } else if (current.scriptedReplies) {
    // ── Hiba scripted replies ──
    const lower = text.toLowerCase();
    let reply = current.scriptedReplies["default"];
    for (const [key, val] of Object.entries(current.scriptedReplies)) {
      if (key !== "default" && lower.includes(key)) { reply = val; break; }
    }
    const delay = 700 + Math.random() * 600;
    setTimeout(() => {
      typing.classList.remove("show");
      renderMsg(reply, "received");
      current.history.push({ text: reply, from: "received" });
      updatePreview(current);
    }, delay);

  } else {
    // ── Generic random replies (Neha etc.) ──
    const delay = 600 + Math.random() * 800;
    setTimeout(() => {
      typing.classList.remove("show");
      const replies = current.replies || ["Nice! 😄", "Adipoli 🔥", "Haha 😂", "Cool 👍", "Tell me more!"];
      const reply   = replies[Math.floor(Math.random() * replies.length)];
      renderMsg(reply, "received");
      current.history.push({ text: reply, from: "received" });
      updatePreview(current);
    }, delay);
  }
}

/* ── UPDATE PREVIEW IN SIDEBAR ── */
function updatePreview(contact) {
  const last = contact.history[contact.history.length - 1];
  const el   = document.querySelector("#ct-" + contact.id + " .contact-preview");
  if (el && last) el.textContent = last.text.slice(0,34) + (last.text.length>34?"…":"");
}

/* ── BACK (mobile) ── */
function goBack() {
  document.getElementById("contactsPanel").classList.remove("hidden");
  document.getElementById("chatPanel").classList.remove("visible");
  document.querySelectorAll(".contact").forEach(el => el.classList.remove("active"));
  current = null;
}

/* ── ENTER KEY ── */
document.getElementById("msgInput").addEventListener("keydown", e => {
  if (e.key === "Enter") sendMessage();
});

/* ── INIT ── */
buildList();
</script>

</body>
</html>
