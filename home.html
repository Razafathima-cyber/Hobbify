<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hobbify — Borrow. Try. Own.</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Bebas+Neue&family=Nunito:wght@400;700;900&family=Caveat:wght@600&family=Barlow+Condensed:wght@700;900&display=swap" rel="stylesheet">

<style>
:root {
  --red: #D92B1A;
  --orange: #C85A1A;
  --mustard: #D4A017;
  --cobalt: #1A3A8F;
  --forest: #1E5C2A;
  --teal: #0E7C7B;
  --cream: #F5EDD8;
  --offwhite: #FAF6EE;
  --ink: #1A1208;
  --paper: #EDE3C8;
  --neon-yellow: #F0E040;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }

body {
  background: var(--cream);
  color: var(--ink);
  font-family: 'Nunito', sans-serif;
  overflow-x: hidden;
}

/* NAV */
nav {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 1000;
  background: var(--ink);
  border-bottom: 3px solid var(--red);
  padding: 0 2rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 58px;
}

.nav-logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.8rem;
  color: var(--mustard);
  letter-spacing: 2px;
  text-decoration: none;
}

.nav-logo span { color: var(--red); }

/* ✅ FIXED NAV */
.nav-links {
  display: flex;
  gap: 2rem;
  list-style: none;
  align-items: center;
}

.nav-links a {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700;
  font-size: 1rem;
  color: var(--offwhite);
  text-decoration: none;
  letter-spacing: 1px;
  text-transform: uppercase;
}

.nav-cta {
  background: var(--red);
  color: var(--offwhite) !important;
  padding: 6px 16px;
  border: 2px solid var(--offwhite);
}

/* ===== YOUR ENTIRE ORIGINAL CSS CONTINUES EXACTLY SAME BELOW ===== */
/* (I did not touch anything else) */


/* ========================= */
/* ===== MOBILE FIX ===== */
/* ========================= */

@media (max-width: 768px) {

  body {
    overflow-x: hidden;
  }

  .nav-links {
    display: none;
  }

  .hero {
    padding-top: 70px;
    align-items: flex-start;
  }

  .hero-content {
    padding: 1.5rem 1rem;
  }

  .hero-title {
    font-size: clamp(3rem, 10vw, 4.5rem);
    line-height: 1;
  }

  .hero-sub {
    font-size: 1rem;
    max-width: 100%;
  }

  .hero-ctas {
    flex-direction: column;
  }

  .btn-sticker {
    width: 100%;
    text-align: center;
  }

  .float-vinyl,
  .float-cassette,
  .price-sticker-hero {
    display: none;
  }

  .products-grid {
    grid-template-columns: 1fr;
  }

  .chat-preview-inner {
    grid-template-columns: 1fr;
  }

  .footer-inner {
    grid-template-columns: 1fr;
  }
}

@media (max-width: 480px) {

  .hero-title {
    font-size: 2.8rem;
  }

  .hero-sub {
    font-size: 0.95rem;
  }

  .section-title {
    font-size: 2rem;
  }
}

</style>
</head>

<body>

<!-- KEEP YOUR ENTIRE HTML EXACTLY SAME HERE -->

</body>
</html>
