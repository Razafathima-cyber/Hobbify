<!DOCTYPE html>
<html lang="en">
<head>
<meta name="theme-color" content="#F5EDD8">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Intro</title>

<style>
  body, html {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: #F5EDD8;
  }

  video {
    width: 100vw;
    height: 100vh;
    object-fit: cover;
  }

  @media (max-width: 768px) {
    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
  }
</style>
</head>

<body>

<video id="introVideo" autoplay muted playsinline>
  <source src="whisk.mp4" type="video/mp4">
</video>

<script>
  const video = document.getElementById("introVideo");

  let loops = 0;
  const maxLoops = 1; // reduced loop for faster transition

  video.addEventListener("ended", () => {
    loops++;

    if (loops < maxLoops) {
      video.currentTime = 0;
      video.play();
    } else {
      window.location.href = "login.html";
    }
  });
</script>

</body>
</html>
