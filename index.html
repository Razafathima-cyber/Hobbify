<!DOCTYPE html>
<html lang="en">
<head>
<meta name="theme-color" content="#FFFFFF">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Intro</title>

<style>
  body, html {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: #FFFFFF;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  video {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain; /* ensures no zoom/cropping */
  }

  @media (max-width: 768px) {
    video {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }
  }
</style>
</head>

<body>

<video id="introVideo" autoplay muted playsinline>
  <source src="whisk.mp4" type="video/mp4">
</video>

<script>
  const video = document.getElementById("introVideo");

  let loops = 0;
  const maxLoops = 1;

  video.addEventListener("ended", () => {
    loops++;

    if (loops < maxLoops) {
      video.currentTime = 0;
      video.play();
    } else {
      window.location.href = "login.html";
    }
  });
</script>

</body>
</html>
